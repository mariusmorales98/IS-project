    <script>

        //youtube vid
        const targetiframe = document.getElementById('music-vid')

        const songDivs = document.querySelectorAll('.tier-items-photo[id]');

        // 3. Add the click event to all of them at once
        songDivs.forEach(div => {
            div.addEventListener('click', function() {
                const url = this.getAttribute('data-link');
                if (url) {
                    targetiframe.src = url;
                    
                    // Optional: Smooth scroll to the video player when a song is picked
                    targetiframe.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
